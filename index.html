<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Paisa Manager Pro - Smart Expense Tracker</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #F5F7FA;
            color: #1F2937;
            overflow-x: hidden;
        }

        /* White + Green Theme Variables */
        :root {
            --bg-white: #FFFFFF;
            --bg-light: #F0FDF4;
            --primary-green: #10B981;
            --primary-dark: #059669;
            --primary-darker: #047857;
            --text-dark: #1F2937;
            --text-gray: #6B7280;
            --border-green: #D1FAE5;
            --success-light: #DCFCE7;
            --shadow: 0 8px 20px rgba(16, 185, 129, 0.08);
            --card-radius: 24px;
        }

        /* Container & Layout */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px 20px 90px 20px;
        }

        /* Cards */
        .card {
            background: var(--bg-white);
            border-radius: var(--card-radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-green);
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s ease, box-shadow 0.2s;
        }
        .card:active {
            transform: scale(0.99);
        }

        /* Buttons */
        .btn-primary {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }
        .btn-primary:active {
            transform: scale(0.97);
            background: var(--primary-dark);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--primary-green);
            color: var(--primary-green);
            padding: 12px 18px;
            border-radius: 60px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-outline:active {
            transform: scale(0.97);
            background: var(--bg-light);
        }

        /* Dashboard Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            border: 1px solid var(--border-green);
            text-align: center;
        }
        .stat-amount {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary-dark);
            margin-top: 6px;
        }
        .progress-bar-bg {
            background: #E5E7EB;
            border-radius: 30px;
            height: 10px;
            overflow: hidden;
            margin: 12px 0;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-green), var(--primary-dark));
            border-radius: 30px;
            transition: width 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* Categories */
        .category-badge {
            background: var(--bg-light);
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: var(--primary-dark);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .expense-item {
            animation: slideUp 0.25s ease;
        }
        .ripple {
            position: relative;
            overflow: hidden;
        }
        .ripple:after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform 0.4s, opacity 0.6s;
        }
        .ripple:active:after {
            transform: scale(0, 0);
            opacity: 0.3;
            transition: 0s;
        }

        /* Onboarding Overlay */
        .onboarding-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            transition: 0.3s;
        }
        .onb-slide {
            text-align: center;
            max-width: 320px;
            animation: fadeIn 0.4s;
        }
        .onb-icon {
            font-size: 70px;
            color: var(--primary-green);
            margin-bottom: 30px;
        }
        .dots {
            display: flex;
            gap: 12px;
            margin: 35px 0;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #CBD5E1;
            border-radius: 10px;
            transition: 0.2s;
        }
        .dot.active {
            width: 28px;
            background: var(--primary-green);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            width: 90%;
            max-width: 380px;
            padding: 24px;
            animation: modalPop 0.2s ease-out;
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: 1px solid #E2E8F0;
            font-size: 15px;
            margin-bottom: 12px;
            background: white;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .text-green { color: var(--primary-green); font-weight: bold; }
        hr { margin: 16px 0; border-color: var(--border-green); }
    </style>
</head>
<body>

<div id="appRoot"></div>

<script>
    // ----------------------------- SUPABASE INIT -----------------------------
    const SUPABASE_URL = "https://klvgssdoepzoeasmovmi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsdmdzc2RvZXB6b2Vhc21vdm1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MDc3ODgsImV4cCI6MjA5NjM4Mzc4OH0.ElQzDCn_-A10LJ01rhTr3S8XvEPuJAySjdMrTUfm99c";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let guestMode = false;
    let appState = {
        salary: 0,
        savingsGoal: 0,
        expenses: [],
        budgets: {},      // { "Food": 5000, ... }
        recurring: []     // [{ category, amount, frequency }]
    };

    // Helper: load guest data from LocalStorage
    function loadGuestData() {
        const data = localStorage.getItem("paisa_guest_data");
        if(data) {
            try {
                const parsed = JSON.parse(data);
                appState.salary = parsed.salary || 0;
                appState.savingsGoal = parsed.savingsGoal || 0;
                appState.expenses = parsed.expenses || [];
                appState.budgets = parsed.budgets || {};
                appState.recurring = parsed.recurring || [];
            } catch(e) {}
        } else {
            appState = { salary: 0, savingsGoal: 0, expenses: [], budgets: {}, recurring: [] };
        }
        renderApp();
    }

    function saveGuestData() {
        if(guestMode) {
            localStorage.setItem("paisa_guest_data", JSON.stringify({
                salary: appState.salary,
                savingsGoal: appState.savingsGoal,
                expenses: appState.expenses,
                budgets: appState.budgets,
                recurring: appState.recurring
            }));
        }
    }

    // ----------------------------- SUPABASE FETCH -----------------------------
    async function fetchUserData(userId) {
        // 1. fetch settings (salary + goal + budgets + recurring)
        const { data: settings } = await supabase.from("pm_settings").select("*").eq("user_uuid", userId).single();
        if(settings) {
            appState.salary = settings.salary || 0;
            appState.savingsGoal = settings.savings_goal || 0;
            appState.budgets = settings.budgets || {};
            appState.recurring = settings.recurring || [];
        } else {
            // create default
            await supabase.from("pm_settings").insert([{ user_uuid: userId, salary: 0, savings_goal: 0, budgets: {}, recurring: [] }]);
            appState.salary = 0; appState.savingsGoal = 0; appState.budgets = {}; appState.recurring = [];
        }
        // 2. fetch expenses
        const { data: expensesData } = await supabase.from("expenses").select("*").eq("user_uuid", userId).order("created_at", { ascending: false });
        appState.expenses = expensesData || [];
        renderApp();
    }

    async function syncExpenseToSupabase(expenseObj) {
        if(!currentUser || guestMode) return;
        await supabase.from("expenses").insert([{ ...expenseObj, user_uuid: currentUser.id }]);
    }

    async function deleteExpenseFromSupabase(expenseId) {
        if(!currentUser || guestMode) return;
        await supabase.from("expenses").delete().eq("id", expenseId).eq("user_uuid", currentUser.id);
    }

    async function updateSettingsSupabase() {
        if(!currentUser || guestMode) return;
        await supabase.from("pm_settings").upsert({ 
            user_uuid: currentUser.id, 
            salary: appState.salary, 
            savings_goal: appState.savingsGoal, 
            budgets: appState.budgets, 
            recurring: appState.recurring 
        });
    }

    // ----------------------------- CORE BUSINESS LOGIC -----------------------------
    function getTotalExpense() {
        const currMonth = new Date().getMonth();
        const currYear = new Date().getFullYear();
        return appState.expenses.filter(exp => {
            const expDate = new Date(exp.date);
            return expDate.getMonth() === currMonth && expDate.getFullYear() === currYear;
        }).reduce((sum, e) => sum + Number(e.amt), 0);
    }

    function getMoneyLeft() { return appState.salary - getTotalExpense(); }
    function getSavingsProgress() { if(appState.savingsGoal <=0) return 0; return Math.min(100, (getMoneyLeft() / appState.savingsGoal) * 100); }
    function getExpensePercent() { if(appState.salary <=0) return 0; return Math.min(100, (getTotalExpense() / appState.salary) * 100); }

    function addExpense(expense) {
        const newExp = { ...expense, id: Date.now() + Math.random() };
        appState.expenses.unshift(newExp);
        if(!guestMode && currentUser) syncExpenseToSupabase(newExp);
        else saveGuestData();
        renderApp();
        animateNumber();
    }
    function deleteExpense(id) {
        appState.expenses = appState.expenses.filter(e => e.id != id);
        if(!guestMode && currentUser) deleteExpenseFromSupabase(id);
        else saveGuestData();
        renderApp();
    }
    function setSalary(value) { appState.salary = Number(value); if(!guestMode && currentUser) updateSettingsSupabase(); else saveGuestData(); renderApp(); animateNumber(); }
    function setGoal(value) { appState.savingsGoal = Number(value); if(!guestMode && currentUser) updateSettingsSupabase(); else saveGuestData(); renderApp(); animateNumber(); }
    function setBudget(cat, amount) { appState.budgets[cat] = Number(amount); if(!guestMode && currentUser) updateSettingsSupabase(); else saveGuestData(); renderApp(); }

    // ----------------------------- UI RENDER (WHITE/GREEN + ENGLISH) -----------------------------
    function animateNumber() { /* simple class to update numbers visually  -  handled by re-render */ }
    const categories = ["Food", "Travel", "Shopping", "Bills", "Health", "Entertainment", "Grocery", "Other"];
    const catIcons = { Food:"fa-utensils", Travel:"fa-plane", Shopping:"fa-bag-shopping", Bills:"fa-file-invoice", Health:"fa-heart-pulse", Entertainment:"fa-film", Grocery:"fa-cart-shopping", Other:"fa-tag" };

    function renderApp() {
        const root = document.getElementById("appRoot");
        if(!root) return;
        const totalExp = getTotalExpense();
        const leftMoney = getMoneyLeft();
        const expensePercent = getExpensePercent();
        const savingsPercent = getSavingsProgress();

        let categoryBreakdown = {};
        appState.expenses.forEach(exp => { if(exp.cat_name) categoryBreakdown[exp.cat_name] = (categoryBreakdown[exp.cat_name]||0) + Number(exp.amt); });
        
        const recentHtml = appState.expenses.slice(0, 8).map(exp => `
            <div class="expense-item flex-between" style="padding:12px 0; border-bottom:1px solid #E5E7EB;">
                <div><i class="fas ${catIcons[exp.cat_name] || 'fa-receipt'} text-green"></i> <strong>${exp.cat_name}</strong><br><small>${exp.date}</small></div>
                <div><span style="font-weight:700;">₹${Number(exp.amt).toLocaleString('en-IN')}</span> <i class="fas fa-trash-alt" style="color:#EF4444; margin-left:12px; cursor:pointer;" onclick="window.deleteExpense(${exp.id})"></i></div>
            </div>
        `).join("");

        root.innerHTML = `
            <div class="container">
                <!-- Header -->
                <div class="flex-between" style="margin-bottom: 16px;">
                    <h2 style="color:var(--primary-dark);">💰 Paisa Manager Pro</h2>
                    ${guestMode ? '<span class="category-badge"><i class="fas fa-user-friends"></i> Guest Mode</span>' : (currentUser ? '<span class="category-badge"><i class="fas fa-cloud-upload-alt"></i> Cloud Sync</span>' : '')}
                </div>
                <!-- Dashboard Grid -->
                <div class="stats-grid">
                    <div class="stat-card">💰 Money Left<br><span class="stat-amount">₹${leftMoney.toLocaleString('en-IN')}</span></div>
                    <div class="stat-card">💼 Salary<br><span class="stat-amount">₹${appState.salary.toLocaleString('en-IN')}</span></div>
                    <div class="stat-card">💸 Expense<br><span class="stat-amount">₹${totalExp.toLocaleString('en-IN')}</span></div>
                    <div class="stat-card">🏦 Savings<br><span class="stat-amount">₹${leftMoney >0 ? leftMoney.toLocaleString('en-IN'):0}</span></div>
                </div>
                <!-- Progress Sections -->
                <div class="card">
                    <div class="flex-between"><span>Expense vs Salary</span><strong>${expensePercent.toFixed(1)}%</strong></div>
                    <div class="progress-bar-bg"><div class="progress-fill" style="width: ${expensePercent}%;"></div></div>
                    <div class="flex-between" style="margin-top:12px;"><span>🎯 Savings Goal Progress</span><strong>${savingsPercent.toFixed(1)}%</strong></div>
                    <div class="progress-bar-bg"><div class="progress-fill" style="width: ${savingsPercent}%;"></div></div>
                    <button class="btn-outline" style="margin-top:12px;" onclick="openSetupModal()"><i class="fas fa-cog"></i> Monthly Setup</button>
                </div>

                <!-- Category Breakdown -->
                <div class="card"><h3>📊 Category Breakdown</h3>${categories.map(cat => `<div class="flex-between"><span><i class="fas ${catIcons[cat]}"></i> ${cat}</span><span>₹${(categoryBreakdown[cat] || 0).toLocaleString('en-IN')}</span></div>`).join("")}</div>

                <!-- Add Expense -->
                <div class="card">
                    <h3>➕ Add Expense</h3>
                    <input type="number" id="expenseAmount" placeholder="₹ Amount">
                    <select id="expenseCategory">${categories.map(c => `<option value="${c}">${c}</option>`).join("")}</select>
                    <input type="date" id="expenseDate" value="${new Date().toISOString().slice(0,10)}">
                    <button class="btn-primary ripple" onclick="addNewExpense()">Add Expense <i class="fas fa-plus-circle"></i></button>
                </div>

                <!-- Recent Entries -->
                <div class="card"><h3>🧾 Recent Entries</h3>${recentHtml || "<p class='text-gray'>No entries yet</p>"}</div>

                <!-- Budget Limits -->
                <div class="card"><h3>🚦 Category Budget Limits</h3>${categories.map(cat => `<div class="flex-between"><span>${cat}</span><input type="number" id="budget-${cat}" placeholder="₹ Limit" style="width:120px; margin:0;" value="${appState.budgets[cat] || ''}"><button class="btn-outline" style="width:auto; padding:6px 14px;" onclick="setBudget('${cat}', document.getElementById('budget-${cat}').value)">Set</button></div>`).join("")}</div>

                <!-- Recurring & Export -->
                <div class="card">
                    <h3>🔁 Recurring Expenses</h3>
                    <div id="recurringList"></div>
                    <div class="flex-between"><input type="number" id="recurAmt" placeholder="₹ Amount"><select id="recurCat">${categories.map(c=>`<option>${c}</option>`)}</select><button class="btn-primary" style="width:auto;" onclick="addRecurring()">Add</button></div>
                    <hr><button class="btn-outline" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
                </div>
                <button class="btn-outline" onclick="logout()" style="margin-bottom:30px;"><i class="fas fa-sign-out-alt"></i> Logout / Reset</button>
            </div>
        `;
        // attach recurring display
        const recDiv = document.getElementById("recurringList");
        if(recDiv) recDiv.innerHTML = appState.recurring.map(r => `<div>${r.category} - ₹${r.amount} / month</div>`).join("");
    }

    window.addNewExpense = function() {
        let amt = document.getElementById("expenseAmount").value;
        let cat = document.getElementById("expenseCategory").value;
        let date = document.getElementById("expenseDate").value;
        if(!amt || amt<=0) return alert("Enter valid amount");
        addExpense({ amt: Number(amt), cat_name: cat, date: date, cat: cat, year: new Date(date).getFullYear(), month: new Date(date).getMonth()+1 });
        document.getElementById("expenseAmount").value = "";
    };
    window.deleteExpense = deleteExpense;
    window.setBudget = setBudget;
    window.openSetupModal = () => {
        let newSal = prompt("Monthly Salary (₹)", appState.salary);
        if(newSal !== null) setSalary(newSal);
        let newGoal = prompt("Savings Goal (₹)", appState.savingsGoal);
        if(newGoal !== null) setGoal(newGoal);
    };
    window.addRecurring = () => {
        let amt = document.getElementById("recurAmt").value;
        let cat = document.getElementById("recurCat").value;
        if(amt && cat) { appState.recurring.push({ category: cat, amount: Number(amt), frequency: "monthly" }); if(!guestMode && currentUser) updateSettingsSupabase(); else saveGuestData(); renderApp(); }
    };
    window.exportCSV = () => {
        let csvRows = [["Date","Category","Amount"]];
        appState.expenses.forEach(e => csvRows.push([e.date, e.cat_name, e.amt]));
        const blob = new Blob([csvRows.map(r => r.join(",")).join("\n")], {type:"text/csv"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "paisa_export.csv"; a.click();
    };
    window.logout = async () => {
        await supabase.auth.signOut();
        currentUser = null; guestMode = false;
        localStorage.removeItem("paisa_guest_data");
        showAuthScreen();
    };

    // ----------------------------- ONBOARDING + AUTH -----------------------------
    let onboardingShown = localStorage.getItem("onboardingComplete");

    function showOnboarding() {
        let slideIndex = 0;
        const slides = [
            { icon: "💰", title: "Paisa Manager Pro", desc: "Track every rupee, achieve every goal. Smart expense management made simple." },
            { icon: "📊", title: "Powerful Features", desc: "Expense Tracking • Savings Goals • Budgets • Recurring • Charts • Export" },
            { icon: "🚀", title: "Ready to Start?", desc: "Sign up for cloud backup or continue as guest" }
        ];
        const onbDiv = document.createElement("div"); onbDiv.className = "onboarding-overlay"; onbDiv.id = "onbOverlay";
        const updateSlide = () => {
            onbDiv.innerHTML = `<div class="onb-slide"><div class="onb-icon">${slides[slideIndex].icon}</div><h2>${slides[slideIndex].title}</h2><p style="margin:20px 0; color:#4B5563;">${slides[slideIndex].desc}</p><div class="dots">${slides.map((_,i)=>`<div class="dot ${i===slideIndex ? 'active' : ''}"></div>`).join("")}</div>${slideIndex < 2 ? '<button class="btn-primary" id="nextBtn">Next →</button>' : '<button class="btn-primary" id="getStartedBtn">Get Started 🚀</button>'}</div>`;
            const nextBtn = document.getElementById("nextBtn"); const getStarted = document.getElementById("getStartedBtn");
            if(nextBtn) nextBtn.onclick = () => { slideIndex++; updateSlide(); };
            if(getStarted) getStarted.onclick = () => { document.body.removeChild(onbDiv); localStorage.setItem("onboardingComplete","true"); showAuthScreen(); };
        };
        updateSlide();
        document.body.appendChild(onbDiv);
    }

    async function showAuthScreen() {
        const root = document.getElementById("appRoot");
        root.innerHTML = `<div class="container" style="text-align:center; margin-top:80px;"><div class="card"><h2>💰 Paisa Manager Pro</h2><p style="margin:20px 0;">Manage expenses, save smarter</p><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Password"><button class="btn-primary" id="doLoginBtn">Login</button><button class="btn-outline" id="doSignupBtn">Create Account</button><hr><button class="btn-outline" id="guestBtn"><i class="fas fa-user-friends"></i> Continue as Guest</button></div></div>`;
        document.getElementById("doLoginBtn").onclick = async () => {
            const email = document.getElementById("loginEmail").value, pass = document.getElementById("loginPassword").value;
            const { error } = await supabase.auth.signInWithPassword({ email, pass });
            if(error) alert(error.message);
            else { await fetchUserAfterAuth(); }
        };
        document.getElementById("doSignupBtn").onclick = async () => {
            const email = document.getElementById("loginEmail").value, pass = document.getElementById("loginPassword").value;
            const { error } = await supabase.auth.signUp({ email, password: pass });
            if(error) alert(error.message); else alert("Check email for confirmation! (or login if already exists)");
        };
        document.getElementById("guestBtn").onclick = () => { guestMode = true; currentUser = null; loadGuestData(); renderApp(); };
    }

    async function fetchUserAfterAuth() {
        const { data: { user } } = await supabase.auth.getUser();
        if(user) {
            currentUser = { id: user.id, email: user.email };
            guestMode = false;
            await fetchUserData(user.id);
        }
    }

    async function checkAuthAndStart() {
        const { data: { user } } = await supabase.auth.getUser();
        if(user) { currentUser = { id: user.id }; guestMode = false; await fetchUserData(user.id); }
        else {
            if(!localStorage.getItem("onboardingComplete")) showOnboarding();
            else showAuthScreen();
        }
    }
    window.addNewExpense = addNewExpense;
    window.deleteExpense = deleteExpense;
    window.setBudget = setBudget;
    window.openSetupModal = openSetupModal;
    window.addRecurring = addRecurring;
    window.exportCSV = exportCSV;
    window.logout = logout;
    window.setBudget = (cat,val) => { appState.budgets[cat]=Number(val); if(!guestMode && currentUser) updateSettingsSupabase(); else saveGuestData(); renderApp(); };
    window.setSalary = setSalary;
    window.setGoal = setGoal;

    checkAuthAndStart();
</script>
</body>
</html>
